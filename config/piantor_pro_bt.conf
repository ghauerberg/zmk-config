# Enable mouse emulation (required for MOUSE layer).
CONFIG_ZMK_POINTING=y
# Fast base speed — precision layer scales this down via slow ramp.
CONFIG_ZMK_POINTING_DEFAULT_MOVE_VAL=1500

# Disable RGB underglow to save power.
CONFIG_ZMK_RGB_UNDERGLOW=n

# Change idle settings
# CONFIG_ZMK_IDLE_TIMEOUT=30000

# Deep sleep settings
# CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Custom keyboard name (max. 16 characters)
# CONFIG_ZMK_KEYBOARD_NAME="My Keyboard"
